services:
  meet:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "3478:3478/udp"
      - "3478:3478/tcp"
    volumes:
      - meet-data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  meet-data:
