services:
  frontend:
    # Local development service for the future Next.js app.
    # Once implementation starts, this service should run `pnpm dev`
    # with the source tree mounted for hot reload.
    image: meet-frontend:dev
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080/ws}
