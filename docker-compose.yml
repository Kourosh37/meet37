services:
  postgres:
    image: postgres:16-alpine
    container_name: meet37-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meet37
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: meet37-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: meet37-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    container_name: meet37-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c '
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/meet37-files;
      cat > /tmp/cors.json <<EOF
      [
        {
          "AllowedOrigins": ["http://localhost", "http://127.0.0.1"],
          "AllowedMethods": ["GET", "PUT", "POST", "HEAD"],
          "AllowedHeaders": ["*"],
          "ExposeHeaders": ["ETag"],
          "MaxAgeSeconds": 3000
        }
      ]
      EOF
      /usr/bin/mc cors set local/meet37-files /tmp/cors.json;
      /usr/bin/mc anonymous set download local/meet37-files;
      exit 0;
      '

  livekit:
    image: livekit/livekit-server:v1.8.3
    container_name: meet37-livekit
    command: --config /etc/livekit.yaml
    volumes:
      - ./infra/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meet37-backend
    depends_on:
      - postgres
      - redis
      - minio-init
      - livekit
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/meet37
      REDIS_URL: redis://redis:6379
      LIVEKIT_API_URL: http://livekit:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: devsecretdevsecretdevsecretdevsec
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: meet37-files
      S3_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_PUBLIC_BASE_URL: http://localhost:9000

  backend-nginx:
    image: nginx:1.27-alpine
    container_name: meet37-backend-nginx
    depends_on:
      - backend
    volumes:
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_LK_URL: ws://localhost/livekit
    container_name: meet37-frontend
    depends_on:
      - backend-nginx

  nginx:
    image: nginx:1.27-alpine
    container_name: meet37-nginx
    depends_on:
      - frontend
      - backend-nginx
      - livekit
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  postgres-data:
  minio-data:

