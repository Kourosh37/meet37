services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "${BACKEND_HOST_PORT:?BACKEND_HOST_PORT is required}:${PORT:?PORT is required}"
      - "${WEBRTC_UDP_HOST_PORT_MIN:?WEBRTC_UDP_HOST_PORT_MIN is required}-${WEBRTC_UDP_HOST_PORT_MAX:?WEBRTC_UDP_HOST_PORT_MAX is required}:${WEBRTC_UDP_PORT_MIN:?WEBRTC_UDP_PORT_MIN is required}-${WEBRTC_UDP_PORT_MAX:?WEBRTC_UDP_PORT_MAX is required}/udp"
    volumes:
      - meet-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- \"$${BACKEND_HEALTHCHECK_URL}\""]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      coturn:
        condition: service_started
    networks:
      - internal
    restart: unless-stopped

  coturn:
    image: "${COTURN_IMAGE:?COTURN_IMAGE is required}"
    container_name: "${COTURN_CONTAINER_NAME:?COTURN_CONTAINER_NAME is required}"
    command:
      - --log-file=stdout
      - --listening-ip=0.0.0.0
      - --listening-port=${TURN_PORT:?TURN_PORT is required}
      - --realm=${TURN_REALM:?TURN_REALM is required}
      - --external-ip=${TURN_PUBLIC_IP:?TURN_PUBLIC_IP is required}
      - --use-auth-secret
      - --static-auth-secret=${TURN_SECRET:?TURN_SECRET is required}
      - --min-port=${TURN_RELAY_PORT_MIN:?TURN_RELAY_PORT_MIN is required}
      - --max-port=${TURN_RELAY_PORT_MAX:?TURN_RELAY_PORT_MAX is required}
      - --fingerprint
      - --no-tls
      - --no-dtls
      - --no-multicast-peers
    ports:
      - "${TURN_HOST_PORT:?TURN_HOST_PORT is required}:${TURN_PORT:?TURN_PORT is required}/udp"
      - "${TURN_HOST_PORT:?TURN_HOST_PORT is required}:${TURN_PORT:?TURN_PORT is required}/tcp"
      - "${TURN_RELAY_PORT_MIN:?TURN_RELAY_PORT_MIN is required}-${TURN_RELAY_PORT_MAX:?TURN_RELAY_PORT_MAX is required}:${TURN_RELAY_PORT_MIN:?TURN_RELAY_PORT_MIN is required}-${TURN_RELAY_PORT_MAX:?TURN_RELAY_PORT_MAX is required}/udp"
      - "${TURN_RELAY_PORT_MIN:?TURN_RELAY_PORT_MIN is required}-${TURN_RELAY_PORT_MAX:?TURN_RELAY_PORT_MAX is required}:${TURN_RELAY_PORT_MIN:?TURN_RELAY_PORT_MIN is required}-${TURN_RELAY_PORT_MAX:?TURN_RELAY_PORT_MAX is required}/tcp"
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:?NEXT_PUBLIC_WS_URL is required}
        NEXT_PUBLIC_TURN_PUBLIC_IP: ${NEXT_PUBLIC_TURN_PUBLIC_IP:?NEXT_PUBLIC_TURN_PUBLIC_IP is required}
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:?BACKEND_INTERNAL_URL is required}
        FRONTEND_PORT: ${FRONTEND_PORT:?FRONTEND_PORT is required}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:?NEXT_PUBLIC_WS_URL is required}
      NEXT_PUBLIC_TURN_PUBLIC_IP: ${NEXT_PUBLIC_TURN_PUBLIC_IP:?NEXT_PUBLIC_TURN_PUBLIC_IP is required}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:?BACKEND_INTERNAL_URL is required}
      PORT: ${FRONTEND_PORT:?FRONTEND_PORT is required}
      FRONTEND_HEALTHCHECK_URL: ${FRONTEND_HEALTHCHECK_URL:?FRONTEND_HEALTHCHECK_URL is required}
    ports:
      - "${FRONTEND_HOST_PORT:?FRONTEND_HOST_PORT is required}:${FRONTEND_PORT:?FRONTEND_PORT is required}"
    depends_on:
      backend:
        condition: service_healthy
      coturn:
        condition: service_started
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  meet-data:
