services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
      - "3478:3478/udp"
      - "3478:3478/tcp"
    volumes:
      - meet-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://backend:8080
        NEXT_PUBLIC_WS_URL: ws://backend:8080/ws
        NEXT_PUBLIC_TURN_PUBLIC_IP: 127.0.0.1
    env_file:
      - ./frontend/.env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8080
      NEXT_PUBLIC_WS_URL: ws://backend:8080/ws
      NEXT_PUBLIC_TURN_PUBLIC_IP: 127.0.0.1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  meet-data:
