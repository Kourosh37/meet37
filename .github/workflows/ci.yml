name: CI

on:
  pull_request:
  push:
    branches:
      - production

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=1 go build -o /tmp/meet-server ./cmd/server

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      BACKEND_INTERNAL_URL: http://backend:8080
      NEXT_PUBLIC_API_BASE_URL: browser-origin
      NEXT_PUBLIC_WS_URL: browser-origin
      NEXT_PUBLIC_TURN_PUBLIC_IP: 127.0.0.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose
        run: docker compose --env-file .env.example config -q

      - name: Validate production compose
        run: DOCKER_IMAGE_TAG=ci docker compose --env-file .env.example -f docker-compose.prod.yml config -q

      - name: Build backend image
        run: docker build -t meet37-backend:ci -f backend/Dockerfile backend

      - name: Build frontend image
        run: |
          docker build \
            -t meet37-frontend:ci \
            -f frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_API_BASE_URL=browser-origin \
            --build-arg NEXT_PUBLIC_WS_URL=browser-origin \
            --build-arg NEXT_PUBLIC_TURN_PUBLIC_IP=127.0.0.1 \
            --build-arg BACKEND_INTERNAL_URL=http://backend:8080 \
            --build-arg FRONTEND_PORT=3000 \
            frontend
